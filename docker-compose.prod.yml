services:
  bastion:
    image: yavik/bastion:1.0.0
    restart: unless-stopped
    ports:
      - "9710:9710/udp"   # SRT relay
      - "8080:8080/tcp"   # HTTP API + dashboard
    volumes:
      - bastion-data:/data
      - ./bastion.toml:/bastion/bastion.toml:ro
    environment:
      - TZ=UTC

volumes:
  bastion-data:
